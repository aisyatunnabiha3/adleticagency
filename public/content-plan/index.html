<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Dashboard V2 — Adletic Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FFFFFF;
    --bg-dark: #08131f;
    --bg-dark-2: #0d1f30;
    --bg-grey: #F7F8FA;
    --text-primary: #374151;
    --text-muted: #6B7280;
    --heading-dark: #0d1117;
    --accent: #f26522;
    --accent-hover: #d9541a;
    --accent-light: rgba(242, 101, 34, 0.10);
    --white: #FFFFFF;
    --border-light: #E5E7EB;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.10);
    --section-hook: #7c3aed;
    --section-hook-light: rgba(124, 58, 237, 0.08);
    --section-main: #f26522;
    --section-main-light: rgba(242, 101, 34, 0.08);
    --section-cta: #059669;
    --section-cta-light: rgba(5, 150, 105, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary); color: var(--text-primary); line-height: 1.6;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-grey); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  /* ── Nav ── */
  .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.06); }
  .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 0.92rem; font-weight: 700; color: var(--heading-dark); flex-shrink: 0; }
  .nav-logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--white); font-weight: 800; font-size: 0.85rem; }
  .nav-date { font-size: 0.82rem; font-weight: 500; color: var(--text-muted); flex-shrink: 0; }
  .nav-date strong { color: var(--heading-dark); }

  /* ── Product Tabs in Nav ── */
  .product-tabs { display: flex; background: var(--bg-grey); border: 1px solid var(--border-light); border-radius: 12px; padding: 3px; gap: 2px; }
  .product-tab { padding: 8px 16px; border: none; border-radius: 10px; background: transparent; color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .product-tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(242,101,34,0.25); }
  .product-tab:not(.active):hover { background: var(--white); color: var(--heading-dark); }
  .product-tab .tab-emoji { font-size: 0.85rem; }

  /* ── Hero ── */
  .hero-header { background: var(--bg-dark); padding: 48px 0 56px; position: relative; overflow: hidden; }
  .hero-header::before { content: ''; position: absolute; right: -80px; top: -80px; width: 300px; height: 300px; background: var(--accent); opacity: 0.06; border-radius: 50%; }
  .hero-content { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; text-align: center; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.58); margin-bottom: 20px; }
  .eyebrow-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse-dot 2.5s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 rgba(242,101,34,0.7)}50%{box-shadow:0 0 0 8px rgba(242,101,34,0)} }
  .hero-title { font-size: clamp(2rem,5vw,3rem); font-weight: 800; color: #fff; line-height: 1.12; letter-spacing: -0.03em; margin-bottom: 12px; }
  .hero-title-accent { color: var(--accent); }
  .hero-subtitle { font-size: clamp(0.95rem,1.8vw,1.1rem); color: rgba(255,255,255,0.55); line-height: 1.7; max-width: 620px; margin: 0 auto; font-weight: 400; }

  /* ── Week Strip ── */
  .week-section { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .week-strip { display: grid; grid-template-columns: repeat(7,1fr) 40px; gap: 4px; margin: -28px auto 32px; position: relative; z-index: 10; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 6px; backdrop-filter: blur(12px); max-width: 680px; }
  .week-dot { text-align: center; padding: 12px 4px; border-radius: 12px; cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent; }
  .week-dot:hover { background: rgba(255,255,255,0.08); }
  .week-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 4px 12px rgba(242,101,34,0.3); }
  .week-dot.active .dot-day,.week-dot.active .dot-num { color: #fff !important; }
  .week-dot .dot-day { font-size: 0.62rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }
  .week-dot .dot-num { font-size: 1.25rem; font-weight: 800; color: rgba(255,255,255,0.8); margin: 3px 0; }
  .week-dot .dot-status { width: 6px; height: 6px; border-radius: 50%; margin: 0 auto; }
  .week-dot.past .dot-num { color: rgba(255,255,255,0.3); }
  .week-dot.past .dot-status { background: rgba(255,255,255,0.2); }
  .week-dot.today .dot-num { color: var(--accent); }
  .week-dot.today .dot-status { background: var(--accent); }
  .week-dot.upcoming .dot-num { color: rgba(255,255,255,0.7); }
  .week-dot.upcoming .dot-status { background: rgba(255,255,255,0.3); }

  /* ── Main ── */
  .main-content { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }
  .day-card { background: var(--white); border: 1px solid var(--border-light); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .card-header { display: flex; align-items: flex-start; gap: 14px; padding: 28px 28px 24px; border-bottom: 1px solid var(--border-light); background: linear-gradient(135deg,#fff7f3 0%,#fff 100%); }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(242,101,34,0.12); color: var(--accent); font-size: 1.2rem; }
  .card-header-text h2 { font-size: 1.15rem; font-weight: 700; color: var(--heading-dark); margin-bottom: 4px; }
  .card-header-text p { font-size: 0.82rem; color: var(--text-muted); margin: 0; }
  .card-header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; align-self: center; }
  .status-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 100px; padding: 4px 12px; white-space: nowrap; }
  .status-badge.today { color: #fff; background: var(--accent); }
  .status-badge.past { color: #065f46; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.22); }
  .status-badge.upcoming { color: #1e3a8a; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.22); }
  .content-type-chip { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 100px; font-size: 0.68rem; font-weight: 700; border: 1px solid transparent; white-space: nowrap; }
  .content-type-chip.educate { background: rgba(59,130,246,0.1); color: #1e3a8a; border-color: rgba(59,130,246,0.22); }
  .content-type-chip.engage { background: rgba(139,92,246,0.1); color: #5b21b6; border-color: rgba(139,92,246,0.22); }
  .content-type-chip.proof { background: rgba(16,185,129,0.1); color: #064e3b; border-color: rgba(16,185,129,0.22); }
  .content-type-chip.community { background: rgba(242,101,34,0.1); color: #b74c0e; border-color: rgba(242,101,34,0.2); }
  .content-type-chip.pain { background: rgba(239,68,68,0.1); color: #991b1b; border-color: rgba(239,68,68,0.2); }
  .content-type-chip.demo { background: rgba(14,165,233,0.1); color: #0c4a6e; border-color: rgba(14,165,233,0.2); }

  /* ── Video Timeline ── */
  .video-timeline { padding: 28px; }
  .timeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .timeline-header h3 { font-size: 1.05rem; font-weight: 700; color: var(--heading-dark); }
  .timeline-total { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); background: var(--bg-grey); padding: 4px 12px; border-radius: 100px; }

  .video-section { border: 1px solid var(--border-light); border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
  .video-section:last-child { margin-bottom: 0; }
  .section-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; transition: background 0.2s; }
  .section-header:hover { background: var(--bg-grey); }
  .section-header.open { border-bottom: 1px solid var(--border-light); }
  .section-badge { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
  .section-badge.hook { background: var(--section-hook-light); color: var(--section-hook); border: 1px solid rgba(124,58,237,0.2); }
  .section-badge.main { background: var(--section-main-light); color: var(--section-main); border: 1px solid rgba(242,101,34,0.2); }
  .section-badge.cta { background: var(--section-cta-light); color: var(--section-cta); border: 1px solid rgba(5,150,105,0.2); }
  .section-info { flex: 1; }
  .section-info h4 { font-size: 0.88rem; font-weight: 700; color: var(--heading-dark); margin-bottom: 2px; }
  .section-info p { font-size: 0.75rem; color: var(--text-muted); margin: 0; }
  .section-avatar { display: flex; align-items: center; gap: 6px; font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .avatar-dot { width: 8px; height: 8px; border-radius: 50%; }
  .avatar-dot.ugc { background: var(--section-hook); }
  .avatar-dot.firaz { background: var(--accent); }
  .avatar-dot.real { background: #059669; }
  .section-time { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); white-space: nowrap; }
  .section-chevron { font-size: 0.8rem; color: var(--text-muted); transition: transform 0.2s; }
  .section-header.open .section-chevron { transform: rotate(180deg); }
  .section-body { display: none; padding: 20px; }
  .section-body.open { display: block; }
  .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #9CA3AF; margin-bottom: 10px; }
  .script-block { background: var(--bg-grey); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .script-block p { font-size: 0.82rem; line-height: 1.75; color: var(--text-primary); font-style: italic; }
  .meta-mini { display: flex; flex-direction: column; gap: 10px; }
  .meta-mini-item { display: flex; align-items: flex-start; gap: 8px; }
  .meta-mini-item .icon { font-size: 0.9rem; flex-shrink: 0; }
  .meta-mini-item strong { font-size: 0.78rem; font-weight: 600; color: var(--heading-dark); display: block; }
  .meta-mini-item p { font-size: 0.75rem; color: var(--text-muted); margin: 0; line-height: 1.5; }

  /* ── Set Design Block ── */
  .set-design { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border: 1px solid var(--border-light); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .set-design h5 { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--section-hook); margin-bottom: 8px; }
  .set-design p { font-size: 0.78rem; color: var(--text-primary); line-height: 1.6; margin: 0; }
  .set-design ul { list-style: none; margin: 0; padding: 0; }
  .set-design li { font-size: 0.78rem; color: var(--text-primary); line-height: 1.6; padding: 3px 0; padding-left: 16px; position: relative; }
  .set-design li::before { content: ''; position: absolute; left: 0; top: 10px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.5; }

  /* ── Editing Block ── */
  .editing-block { background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .editing-block h5 { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 8px; }
  .editing-block p, .editing-block li { font-size: 0.78rem; color: rgba(255,255,255,0.75); line-height: 1.6; }
  .editing-block ul { list-style: none; margin: 0; padding: 0; }
  .editing-block li { padding: 3px 0; padding-left: 16px; position: relative; }
  .editing-block li::before { content: ''; position: absolute; left: 0; top: 10px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* ── Prompt Cards (for AI Video product) ── */
  .section-prompts { border-top: 1px solid var(--border-light); padding: 16px 20px; background: #fafbfc; }
  .transition-card { background: var(--bg-grey); border: 1px solid var(--border-light); border-radius: 12px; overflow: hidden; transition: all 0.2s; cursor: pointer; margin-bottom: 8px; }
  .transition-card:last-child { margin-bottom: 0; }
  .transition-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .transition-card.copied { border-color: var(--accent); background: rgba(242,101,34,0.03); }
  .transition-card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border-light); background: linear-gradient(135deg,#fff7f3 0%,var(--bg-grey) 100%); }
  .transition-panels { display: flex; align-items: center; gap: 6px; }
  .panel-num { font-size: 0.62rem; font-weight: 800; color: var(--accent); background: var(--accent-light); border: 1px solid rgba(242,101,34,0.2); border-radius: 6px; padding: 2px 8px; }
  .panel-arrow { color: var(--text-muted); font-size: 0.75rem; }
  .transition-label { font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .transition-copy-hint { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); opacity: 0; transition: opacity 0.2s; }
  .transition-card:hover .transition-copy-hint { opacity: 1; }
  .transition-card.copied .transition-copy-hint { opacity: 1; color: var(--accent); }
  .transition-card-body { padding: 12px 14px; }
  .transition-card-body p { font-size: 0.75rem; color: var(--text-primary); line-height: 1.6; margin: 0; }
  .f2v-specs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .f2v-spec { font-size: 0.62rem; font-weight: 700; padding: 3px 8px; background: var(--white); border: 1px solid var(--border-light); border-radius: 5px; color: var(--heading-dark); }
  .f2v-spec span { color: var(--text-muted); font-weight: 500; }
  .model-info { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: linear-gradient(135deg,#0d1117 0%,#1a1f2e 100%); border-radius: 10px; margin-bottom: 12px; }
  .model-info-icon { font-size: 1rem; }
  .model-info strong { font-size: 0.78rem; font-weight: 700; color: #fff; display: block; }
  .model-info p { font-size: 0.68rem; color: rgba(255,255,255,0.5); margin: 0; }

  /* ── Inline Edit ── */
  .editable-block { position: relative; }
  .edit-btn { position: absolute; top: 8px; right: 8px; background: var(--white); border: 1px solid var(--border-light); border-radius: 8px; padding: 4px 10px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); cursor: pointer; transition: all 0.2s; opacity: 0; z-index: 5; font-family: 'Inter', sans-serif; }
  .editable-block:hover .edit-btn { opacity: 1; }
  .edit-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(242,101,34,0.04); }
  .edit-btn.saving { color: var(--section-cta); border-color: var(--section-cta); }
  .editing-block .edit-btn { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
  .editing-block:hover .edit-btn { opacity: 1; }
  .editing-block .edit-btn:hover { color: var(--accent); border-color: var(--accent); }
  .inline-editor { width: 100%; min-height: 80px; padding: 12px; border: 2px solid var(--accent); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.82rem; line-height: 1.75; color: var(--text-primary); background: var(--white); resize: vertical; outline: none; }
  .inline-editor.dark { background: #0d1117; color: rgba(255,255,255,0.85); border-color: var(--accent); }
  .edit-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
  .edit-actions button { padding: 6px 14px; border-radius: 8px; font-size: 0.72rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; border: 1px solid var(--border-light); transition: all 0.2s; }
  .edit-actions .save-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .edit-actions .save-btn:hover { background: var(--accent-hover); }
  .edit-actions .cancel-btn { background: var(--white); color: var(--text-muted); }
  .edit-actions .cancel-btn:hover { color: var(--heading-dark); }
  .prompt-full-text { white-space: pre-wrap; word-break: break-word; }

  /* ── Week Dot Wrapper ── */
  .week-dot-wrapper { position: relative; display: flex; flex-direction: column; }

  /* ── Calendar Picker Button ── */
  .cal-picker-btn { display: flex; align-items: center; justify-content: center; padding: 10px 8px; border-radius: 12px; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); transition: all 0.2s; }
  .cal-picker-btn:hover { background: rgba(255,255,255,0.12); border-color: var(--accent); }
  .cal-picker-btn svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.6); fill: none; stroke-width: 2; }
  .cal-picker-btn:hover svg { stroke: var(--accent); }

  /* ── Full Calendar Overlay ── */
  .cal-overlay { display: none; max-width: 680px; margin: -12px auto 24px; background: rgba(13,19,31,0.97); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; backdrop-filter: blur(20px); position: relative; z-index: 20; }
  .cal-overlay.open { display: block; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-nav button { background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 700; transition: all 0.2s; }
  .cal-nav button:hover { border-color: var(--accent); color: var(--accent); }
  .cal-nav .cal-title { font-size: 0.9rem; font-weight: 700; color: #fff; cursor: pointer; padding: 4px 12px; border-radius: 8px; transition: all 0.2s; }
  .cal-nav .cal-title:hover { background: rgba(255,255,255,0.08); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-grid .cal-head { text-align: center; font-size: 0.6rem; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; padding: 6px 0; }
  .cal-grid .cal-day { text-align: center; padding: 8px 4px; border-radius: 8px; cursor: pointer; font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.6); transition: all 0.15s; }
  .cal-grid .cal-day:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .cal-grid .cal-day.today { color: var(--accent); font-weight: 800; }
  .cal-grid .cal-day.selected { background: var(--accent); color: #fff; border-radius: 8px; }
  .cal-grid .cal-day.other-month { color: rgba(255,255,255,0.15); }
  .cal-grid .cal-day.has-content { position: relative; }
  .cal-grid .cal-day.has-content::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  /* Year/Month picker grid */
  .cal-year-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .cal-year-grid .cal-year-item { text-align: center; padding: 10px 4px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.6); transition: all 0.15s; }
  .cal-year-grid .cal-year-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .cal-year-grid .cal-year-item.current { color: var(--accent); font-weight: 800; }

  /* ── Save Indicator ── */
  #saveIndicator { position: fixed; bottom: 24px; right: 24px; padding: 8px 16px; border-radius: 8px; font-size: 0.72rem; font-weight: 600; z-index: 200; transition: all 0.3s; opacity: 0; pointer-events: none; }

ir.` },

      { type:'main', title:'Main — The Problem + AIOS Solution', avatar:'AIOS Presenter', avatarType:'ugc', duration:'15-75s',
        description:'The core pitch. First: the pain (every AI tool makes you start from zero — re-prompting, re-explaining, no memory). Then: the solution (AIOS syncs with YOUR data, hosted on your own PC, connected to WhatsApp). Walk through the 5 layers. Show the terminal/dashboard on the LED screen behind him.',
        tiktokFormat:'🧠 PRODUCT DEMO — The presenter walks through the problem (everyone relates to re-prompting AI and losing context every session), then reveals the solution live on the LED screen behind him. The stage format keeps it premium. Screen changes behind him as he talks through each point.',
        script:`[LED screen changes to show "The Problem"]\n\nEvery AI tool makes you start from zero.\n\nYou open ChatGPT. You paste your data. You explain your business. You prompt it. You get a reply. Next session? It forgot everything. You start again.\n\nYou're feeding the AI every single time. It never learns. It never remembers your clients, your pipeline, your numbers.\n\n[LED screen changes to show AIOS terminal interface]\n\nThat's why I built AIOS.\n\nIt's not a chatbot you prompt. It's an AI that already knows your business.\n\nWatch this.\n\n[He turns to the screen. Types a command.]\n\n"AIOS, check pipeline."\n\n[Screen shows: Scanning 47 active deals... 3 deals closing this week — RM42,000]\n\n"AIOS, follow up cold leads."\n\n[Screen shows: Sending personalized WhatsApp to 23 contacts... Done. 23/23 delivered in 4 seconds.]\n\n[He turns back to camera.]\n\nNo prompting. No pasting. It already has your data. It runs on your own PC.\n\n[LED screen shows the 5 layers diagram]\n\n5 layers of AI intelligence. Context. Data. Intelligence. Automate. Build.\n\nSynced to YOUR business. It remembers your clients. It queries your database in real time. It scores your leads. It sends WhatsApp on autopilot. And it generates proposals on demand.\n\nOne AI. Knows everything. Forgets nothing.`,

          { label:'PANELS 4-5 — PROBLEM + TERMINAL', step:4, prompt:`2-panel storyboard. 9:16 vertical. Panel 1: Same professional stage. Same young man — early-to-mid 20s, Southeast Asian (Malay), medium-brown skin, defined curly dark brown hair (short sides, voluminous curly top), clean-shaven, sharp jawline. Fitted black crew-neck t-shirt (heavyweight cotton, visible fabric texture), black slim joggers, Chelsea boots. Medium-wide shot — standing center stage, weight on back foot, one hand extended palm-up in a "let me explain the problem" gesture. Expression is serious, empathetic, eyebrows slightly furrowed — addressing a pain point the audience feels. Behind him on the LED wall: clean slide — dark navy-black background, "The Problem" in large bold white serif text, subtitle "Every AI Tool Makes You Start From Zero." in lighter sans-serif below. LED casting a cold navy wash across the stage — the mood has shifted from the warm orange reveal to cold reality. Overhead spotlight slightly dimmed, LED screen is now the dominant light source. Floor reflects the navy-blue glow. Stage haze visible between him and the screen, catching the cold blue light. Static camera, professional broadcast framing. Panel 2: OVER-SHOULDER camera angle — we see the presenter from behind his right shoulder, his profile visible. He has turned 90° to face the LED wall. His right hand extended toward the screen in a presenting gesture, index finger pointing at specific text. On the LED wall: the ACTUAL AIOS Terminal application — dark-themed desktop app. Title bar reads "AIOS Terminal". Left sidebar: orange AIOS robot mascot logo at top, green dot status indicator next to "aios", sections listed vertically — QUICK ACTIONS (sub-items: "Morning Brief", "Lead Audit", "Revenue C...", "Draft Prop...", "Pipeline R...", "Weekly Re..."), COMMANDS (count badge "1"), CONTEXT (count badge "1"), FILES, SCHEDULE, SKILLS (orange count badge "30"), MEMORY, SETTINGS. Main terminal panel: orange-boxed "Welcome to Claude Code!" message at top, then green command line showing "> aios check pipeline" followed by white text "Scanning 47 active deals..." and "3 deals closing this week (RM 42,000)", then "> aios follow-up cold leads" and "Sending personalized WhatsApp to 23 contacts... Done. 23/23 delivered in 4 seconds." Bottom status bar: "AIOS | aios | ~/Documents/aios | Connected" in orange text with green connected dot. The terminal's dark UI with orange accents casts a warm amber glow on the presenter's face from the side. Visible screen reflection in his eyes. Sharp focus on both the presenter's profile and the screen content. Hyper-realistic. No CGI look.` },
          { label:'PANELS 6-7 — 5 LAYERS + CONVICTION', step:5, prompt:`2-panel storyboard. 9:16 vertical. Panel 1: Same stage. Same young man (early-to-mid 20s, Southeast Asian Malay, curly dark brown hair, clean-shaven, fitted black t-shirt, black joggers, Chelsea boots). He has stepped to the LEFT side of the stage, body angled 45° toward the LED wall on his right. Both hands raised in a teaching gesture — left hand pointing at the top of the diagram, right hand open at waist level. Dynamic teaching energy, mid-stride weight shift. On the LED wall: clean infographic on dark navy-black background — title "5 Layers of AI Intelligence" in white bold. Five stacked horizontal bars in gradient from bright orange (top) to deep navy (bottom): "01 CONTEXT — Remembers your clients, deals, preferences" in orange, "02 DATA — Queries your database in real time" in amber, "03 INTELLIGENCE — Scores leads, spots patterns, surfaces insights" in warm gold, "04 AUTOMATE — WhatsApp blasts, follow-ups, scheduling on autopilot" in teal, "05 BUILD — Generates proposals, reports, documents on demand" in navy. Each bar has a subtle left-side icon glow. The infographic light casts a gradient of warm-to-cool light across the presenter — orange on his pointing hand fading to blue at his feet. Camera is wider than previous shots to capture both the full presenter AND the full diagram. Stage haze visible. Panel 2: Medium close-up (chest and head). He has turned back from the screen to face camera directly. Expression has shifted — no longer teaching, now CONVICTED. Jaw set, eyes slightly narrowed, the intensity of someone who just proved their point irrefutably. Right hand held up with index finger raised — the "one thing" gesture. Left hand at his side, relaxed — all the energy is in the single raised finger and his eyes. Behind him: LED wall slightly out of focus (shallow f/2.0 depth of field) but visibly showing the AIOS Terminal onboarding conversation — dark UI with green bullet points a const LS_PREFIX = 'cp10_';
const contentCache = {};

function dateToStr(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function getActiveDateStr(dayIndex) {
  const ws = getWeekStartDate();
  const d = new Date(ws);
  d.setDate(ws.getDate() + dayIndex);
  return dateToStr(d);
}

function cacheKey(planType, dateStr) { return `${planType}:${dateStr}`; }

function makeEmptyDay(dayIndex) {
  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const emptySection = (type, title) => ({
    type, title, avatar:'', avatarType:'real', duration:'',
    description:'', script:'', music:'', hookText:'',
    setDesign:{ location:'', lighting:'', props:'', wardrobe:'', camera:'', framing:'' },
    editing:{ cuts:'', transitions:'', text:'', sound:'', pacing:'' },
    _isEmpty: true
  });
  return {
    day: dayNames[dayIndex % 7], title: 'UNTITLED', contentType: 'educate', contentTypeLabel: 'Educate',
    totalDuration: '~45-60s', _isEmpty: true,
    sections: [
      emptySection('hook', 'Hook — [Edit Title]'),
      emptySection('main', 'Main — [Edit Title]'),
      emptySection('cta', 'CTA — [Edit Title]')
    ]
  };
}

function getActiveContent() {
  const dateStr = getActiveDateStr(activeDay);
  const key = cacheKey(activeProduct, dateStr);
  const val = contentCache[key];
  return (val && typeof val === 'object') ? val : null;
}

// Load week content: check localStorage for edits, fallback to hardcoded defaults
function loadWeekContent() {
  const ws = getWeekStartDate();
  // Default seed dates mapped to plan array indices
  // Starting March 12, 2026
  const defaultDateMap = {
    'ai-video':    { '2026-03-14':0,'2026-03-15':1,'2026-03-16':2,'2026-03-17':3,'2026-03-18':4,'2026-03-19':9,'2026-03-20':5,'2026-03-21':6,'2026-03-22':10,'2026-03-23':7,'2026-03-24':10 },
    'ai-employee': { '2026-03-14':0,'2026-03-15':1,'2026-03-16':2,'2026-03-17':3,'2026-03-18':4,'2026-03-19':5,'2026-03-20':6 },
    'paid-ads':    { '2026-03-14':0,'2026-03-15':1,'2026-03-16':2,'2026-03-17':3,'2026-03-18':4,'2026-03-19':5,'2026-03-20':6 }
  };
  const defaultPlans = { 'ai-video': AI_VIDEO_PLAN, 'ai-employee': AI_EMPLOYEE_PLAN, 'paid-ads': PAID_ADS_PLAN };

  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const ds = dateToStr(d);
    const key = cacheKey(activeProduct, ds);

    // 1. Check localStorage for saved edits
    const stored = localStorage.getItem(LS_PREFIX + key);
    if (stored) {
      try { contentCache[key] = JSON.parse(stored); continue; } catch(e) {}
    }

    // 2. Check if this date matches default seed data
    const dateMap = defaultDateMap[activeProduct] || {};
    const seedIdx = dateMap[ds] !== undefined ? dateMap[ds] : -1;
    const plan = defaultPlans[activeProduct];
    if (seedIdx >= 0 && plan && plan[seedIdx]) {
      contentCache[key] = plan[seedIdx];
    }
    // 3. Otherwise, no content for this date (empty state)
  }
}

function saveDayContent(dateStr, planType, content) {
  const key = cacheKey(planType, dateStr);
  contentCache[key] = content;
  localStorage.setItem(LS_PREFIX + key, JSON.stringify(content));
  // Show save indicator
  const indicator = document.getElementById('saveIndicator');
  if (indicator) {
    indicator.classList.add('saved'); indicator.textContent = 'Saved';
    setTimeout(() => indicator.classList.remove('saved'), 2000);
  }
}

function getWeekStartDate() {
  const stored = localStorage.getItem('contentPlanV2StartDate');
  if (stored) return new Date(stored);
  // Default: Monday of current week (March 9, 2026 for today March 10)
  const today = new Date(); const dow = today.getDay();
  const diff = dow === 0 ? -6 : 1 - dow; // Get Monday (go back)
  const mon = new Date(today); mon.setDate(today.getDate() + diff); mon.setHours(0,0,0,0);
  localStorage.setItem('contentPlanV2StartDate', mon.toISOString());
  return mon;
}
function formatDate(d) { const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const w=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']; return `${w[d.getDay()]}, ${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`; }
function getDayStatus(i) { const ws=getWeekStartDate(); const dd=new Date(ws); dd.setDate(ws.getDate()+i); const t=new Date(); t.setHours(0,0,0,0); dd.setHours(0,0,0,0); if(dd.getTime()===t.getTime()) return 'today'; return dd<t?'past':'upcoming'; }
function getTodayIndex() { const ws=getWeekStartDate(); const t=new Date(); t.setHours(0,0,0,0); const s=new Date(ws); s.setHours(0,0,0,0); const d=Math.floor((t-s)/(864e5)); if(d>=0&&d<7) return d; return d<0?0:6; }

    }

    sectionsHTML += `
      <div class="video-section">
        <div class="section-header ${isOpen?'open':''}" onclick="toggleSection(${activeDay},${si})">
          <span class="section-badge ${sec.type}">${sec.type.toUpperCase()}</span>
          <div class="section-info"><h4>${sec.title}</h4><p>${sec.description}</p></div>
          <div class="section-avatar"><span class="avatar-dot ${avatarDotClass}"></span>${sec.avatar || ''}</div>
          <div class="section-time">${sec.duration}</div>
          <span class="section-chevron">&#9660;</span>
        </div>
        <div class="section-body ${isOpen?'open':''}">${bodyContent}</div>
      </div>`;
  });

  container.innerHTML = `
    <div class="day-card">
      <div class="card-header">
        <div class="card-icon">${icons[c.contentType]||icons.educate}</div>
        <div class="card-header-text"><h2>${c.day} — <span class="editable-inline" onclick="event.stopPropagation();editDayTitle(${activeDay})" style="cursor:pointer;border-bottom:${c._isEmpty?'2px dashed #ef4444':'none'}">${c.title}${c._isEmpty?'<span class="empty-tag">Click to edit</span>':''}</span></h2><p>Full video plan &middot; ${c.totalDuration}</p></div>
        <div class="card-header-right">
          <span class="content-type-chip ${c.contentType}">${c.contentTypeLabel}</span>
          <span class="status-badge ${st}">${sl}</span>
        </div>
      </div>
      <div class="video-timeline">
        <div class="timeline-header"><h3>Video Sections</h3><span class="timeline-total">${c.sections.length} sections &middot; ${c.totalDuration}</span></div>
        ${sectionsHTML}
      </div>
    </div>`;
}

// ── Calendar Picker ──
let calViewYear = new Date().getFullYear();
let calViewMonth = new Date().getMonth();
let calMode = 'days'; // 'days', 'months', 'years'

function toggleCalendar() {
  const el = document.getElementById('calOverlay');
  if (el.classList.contains('open')) { el.classList.remove('open'); return; }
  calViewYear = new Date().getFullYear();
  calViewMonth = new Date().getMonth();
  calMode = 'days';
  el.classList.add('open');
  renderCalendar();
}

function renderCalendar() {
  const el = document.getElementById('calOverlay');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const today = new Date(); today.setHours(0,0,0,0);

  if (calMode === 'years') {
    const startDecade = Math.floor(calViewYear / 10) * 10 - 1;
    let html = `<div class="cal-nav">
      <button onclick="calViewYear-=10;renderCalendar()">&#9664;</button>
      <span class="cal-title">${startDecade+1} — ${startDecade+10}</span>
      <button onclick="calViewYear+=10;renderCalendar()">&#9654;</button>
    </div><div class="cal-year-grid">`;
    for (let y = startDecade; y <= startDecade + 11; y++) {
      const isCurrent = y === today.getFullYear();
      const isOutside = y < startDecade + 1 || y > startDecade + 10;
      html += `<div class="cal-year-item ${isCurrent?'current':''}" style="${isOutside?'opacity:0.3':''}" onclick="calViewYear=${y};calMode='months';renderCalendar()">${y}</div>`;
    }
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  if (calMode === 'months') {
    let html = `<div class="cal-nav">
      <button onclick="calViewYear--;renderCalendar()">&#9664;</button>
      <span class="cal-title" onclick="calMode='years';renderCalendar()">${calViewYear}</span>
      <button onclick="calViewYear++;renderCalendar()">&#9654;</button>
    </div><div class="cal-year-grid">`;
    const shortMonths = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    for (let m = 0; m < 12; m++) {
      const isCurrent = calViewYear === today.getFullYear() && m === today.getMonth();
      html += `<div class="cal-year-item ${isCurrent?'current':''}" onclick="calViewMonth=${m};calMode='days';renderCalendar()">${shortMonths[m]}</div>`;
    }
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  // Days mode
  const first = new Date(calViewYear, calViewMonth, 1);
  const startDay = (first.getDay() + 6) % 7; // Monday = 0
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  const daysInPrev = new Date(calViewYear, calViewMonth, 0).getDate();

  let html = `<div class="cal-nav">
    <button onclick="calViewMonth--;if(calViewMonth<0){calViewMonth=11;calViewYear--;}renderCalendar()">&#9664;</button>
    <span class="cal-title" onclick="calMode='months';renderCalendar()">${months[calViewMonth]} ${calViewYear}</span>
    <button onclick="calViewMonth++;if(calViewMonth>11){calViewMonth=0;calViewYear++;}renderCalendar()">&#9654;</button>
  </div><div class="cal-grid">`;

  const dayHeaders = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  dayHeaders.forEach(d => html += `<div class="cal-head">${d}</div>`);

  // Previous month days
  for (let i = startDay - 1; i >= 0; i--) {
    const day = daysInPrev - i;
    html += `<div class="cal-day other-month" onclick="calViewMonth--;if(calViewMonth<0){calViewMonth=11;calViewYear--;}selectCalDate(${calViewYear},${calViewMonth<0?11:calViewMonth},${day})">${day}</div>`;
  }

  // Current month days
  const ws = getWeekStartDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calViewYear, calViewMonth, d);
    const isToday = date.getTime() === today.getTime();
    const isSelected = date.getTime() >= ws.getTime() && date.getTime() < new Date(ws.getTime() + 7*864e5).getTime();
    const ds = dateToStr(date);
    const hasContent = !!contentCache[cacheKey(activeProduct, ds)];
    html += `<div class="cal-day ${isToday?'today':''} ${isSelected?'selected':''} ${hasContent?'has-content':''}" onclick="selectCalDate(${calViewYear},${calViewMonth},${d})">${d}${hasContent?'<span class="cal-dot"></span>':''}</div>`;
  }

  // Next month days
  const totalCells = startDay + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="cal-day other-month" onclick="calViewMonth++;if(calViewMonth>11){calViewMonth=0;calViewYear++;}selectCalDate(${calViewYear},${calViewMonth>11?0:calViewMonth},${d})">${d}</div>`;
  }

  html += '</div>';
  el.innerHTML = html;
}

function selectCalDate(year, month, day) {
  const selected = new Date(year, month, day);
  const dow = selected.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(selected);
  monday.setDate(selected.getDate() + diff);
  monday.setHours(0,0,0,0);
  localStorage.setItem('contentPlanV2StartDate', monday.toISOString());

  const dayIndex = ((selected.getDay() + 6) % 7);
  activeDay = dayIndex;
  openSections = {};

  document.getElementById('calOverlay').classList.remove('open');
  loadWeekContent();
  render();
}

function editDayTitle(dayIdx) {
  const dateStr = getActiveDateStr(dayIdx);
  const key = cacheKey(activeProduct, dateStr);
  if (!contentCache[key]) contentCache[key] = makeEmptyDay(dayIdx);
  const c = contentCache[key];
  const el = document.querySelector('.editable-inline');
  const current = c.title;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current === 'UNTITLED' ? '' : current;
  input.placeholder = 'Enter video title...';
  input.style.cssText = 'font-size:1.15rem;font-weight:700;color:var(--heading-dark);border:2px solid var(--accent);border-radius:8px;padding:4px 8px;width:300px;font-family:Inter,sans-serif;outline:none;text-transform:uppercase;';
  input.onclick = (e) => e.stopPropagation();
  const saveTitle = () => { c.title = input.value.toUpperCase() || 'UNTITLED'; render(); saveDayContent(dateStr, activeProduct, c); };
  input.onkeydown = (e) => {
    if(e.key==='Enter') saveTitle();
    if(e.key==='Escape') render();
  };
  input.onblur = saveTitle;
  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
}

function addDayContent(dayIdx) {
  const dateStr = getActiveDateStr(dayIdx);
  const content = makeEmptyDay(dayIdx);
  contentCache[cacheKey(activeProduct, dateStr)] = content;
  activeDay = dayIdx;
  openSections = {};
  content.sections.forEach((_, si) => {
    openSections[`${activeProduct}-${dayIdx}-${si}`] = true;
  });
  saveDayContent(dateStr, activeProduct, content);
  render();
}

function copyPrompt(el, dayIdx, secIdx, type, promptIdx) {
  const dateStr = getActiveDateStr(dayIdx);
  const c = contentCache[cacheKey(activeProduct, dateStr)];
  if (!c) return;
  const sec = c.sections[secIdx];
  let text = '';
  if (type === 'nano') text = sec.nanoPrompts[promptIdx].prompt;
  else if (type === 'i2v') text = sec.i2vClips[promptIdx].motion;
  else if (type === 'f2v-start') text = sec.f2vClips[promptIdx].startPrompt;
  else if (type === 'f2v-end') text = sec.f2vClips[promptIdx].endPrompt;
  else if (type === 'f2v-motion') text = sec.f2vClips[promptIdx].motion + '\nAUDIO: ' + (sec.f2vClips[promptIdx].audio || '');
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    const hint = el.querySelector('.transition-copy-hint');
    hint.textContent = 'Copied!';
    setTimeout(() => { el.classList.remove('copied'); hint.textContent = 'Click to copy'; }, 2000);
  });
}

function startEdit(btn, field, dayIdx, secIdx, promptIdx) {
  const dateStr = getActiveDateStr(dayIdx);
  const key = cacheKey(activeProduct, dateStr);
  if (!contentCache[key]) contentCache[key] = makeEmptyDay(dayIdx);
  const contentObj = contentCache[key];
  const sec = contentObj.sections[secIdx];
  const block = btn.closest('.editable-block');
  const display = block.querySelector('.display-content');
  const isDark = block.classList.contains('editing-block');
  let currentValue = '';

  if (field === 'script') currentValue = sec.script;
  else if (field === 'tiktokFormat') currentValue = sec.tiktokFormat;
  else if (field === 'setDesign') {
    const sd = sec.setDesign;
    currentValue = ['location','lighting','props','wardrobe','camera','framing']
      .filter(k => sd[k]).map(k => k.charAt(0).toUpperCase()+k.slice(1)+': '+sd[k]).join('\n');
  }
  else if (field === 'editing') {
    const ed = sec.editing;
    currentValue = [['cuts','Cuts'],['transitions','Transitions'],['text','On-Screen Text'],['sound','Sound Design'],['pacing','Pacing']]
      .filter(([k]) => ed[k]).map(([k,l]) => l+': '+ed[k]).join('\n');
  }
  else if (field === 'nanoPrompt') currentValue = sec.nanoPrompts[promptIdx].prompt;
  else if (field === 'i2vClip') currentValue = sec.i2vClips[promptIdx].motion;

  btn.style.display = 'none';
  display.style.display = 'none';

  const editor = document.createElement('div');
  editor.className = 'inline-edit-area';
  const ta = document.createElement('textarea');
  ta.className = 'inline-editor' + (isDark ? ' dark' : '');
  ta.value = currentValue;
  ta.rows = Math.max(4, currentValue.split('\n').length + 1);
  ta.onclick = (e) => e.stopPropagation();

  const actions = document.createElement('div');
  actions.className = 'edit-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'save-btn';
  saveBtn.textContent = 'Save';
  saveBtn.onclick = (e) => {
    e.stopPropagation();
    const val = ta.value;
    if (field === 'script') sec.script = val;
    else if (field === 'tiktokFormat') sec.tiktokFormat = val;
    else if (field === 'setDesign') {
      val.split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const key = line.substring(0, idx).trim().toLowerCase();
        const v = line.substring(idx + 1).trim();
        if (key === 'on-screen text') sec.setDesign.text = v;
        else if (key === 'sound design') sec.setDesign.sound = v;
        else if (sec.setDesign.hasOwnProperty(key)) sec.setDesign[key] = v;
      });
    }
    else if (field === 'editing') {
      val.split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const label = line.substring(0, idx).trim();
        const v = line.substring(idx + 1).trim();
        const map = {'Cuts':'cuts','Transitions':'transitions','On-Screen Text':'text','Sound Design':'sound','Pacing':'pacing'};
        if (map[label]) sec.editing[map[label]] = v;
      });
    }
    else if (field === 'nanoPrompt') sec.nanoPrompts[promptIdx].prompt = val;
    else if (field === 'i2vClip') sec.i2vClips[promptIdx].motion = val;
    render();
    saveDayContent(dateStr, activeProduct, contentObj);
  };
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel-btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = (e) => {
    e.stopPropagation();
    editor.remove();
    display.style.display = '';
    btn.style.display = '';
  };

  actions.appendChild(cancelBtn);
  actions.appendChild(saveBtn);
  editor.appendChild(ta);
  editor.appendChild(actions);
  display.parentNode.insertBefore(editor, display.nextSibling);
  ta.focus();
}

// ── App Init ──
function initApp() {
  // Reset stale week start from previous version
  const oldStart = localStorage.getItem('contentPlanV2StartDate');
  if (oldStart && oldStart.includes('2026-03-16')) {
    localStorage.removeItem('contentPlanV2StartDate');
  }
  activeDay = getTodayIndex();
  loadWeekContent();
  render();
}
initApp();
</script>
